# tests.yaml — GitHub Actions CI for course-maker lab assignments.
#
# Copied to labs/<LAB_DIR>/starter/.github/workflows/tests.yaml by
# /course-maker lab init. This file is shared across all labs and should
# not be modified per lab — change it once here, propagates to new labs.
#
# Behavior:
# - pytest runs from the repo root; tests.py and conftest.py are at root.
# - STUDENT_ID is exported (repo variable, fallback "1"). It is only meaningful
#   when the lab uses per-student variants (lab_variants: true); otherwise
#   nothing reads it and it is harmless. For GitHub Classroom with variants,
#   students set their own variable per-fork.
# - If the course uses a grade reporter (grade_report.py) whose grade line your
#   autograder consumes, that line is captured from the workflow logs. With no
#   reporter, pytest's own pass/fail result is the CI outcome.

name: Lab Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Tooling required by conftest_base.py and lab tests
          pip install pytest nbformat nbconvert jupyter

      - name: Convert notebook to script
        # exercises.ipynb → exercises.py so failures surface as line numbers
        # in the student's code, not opaque cell numbers.
        run: |
          jupyter nbconvert --to python exercises.ipynb --output exercises

      - name: Run tests
        env:
          # Used only by labs with per-student variants; harmless otherwise.
          STUDENT_ID: ${{ vars.STUDENT_ID || '1' }}
        run: |
          pytest tests.py -v --tb=short
