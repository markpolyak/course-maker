# Profile: generic — no defaults.
# Every value is empty; the course init wizard asks each question fresh.
# To create your own profile with defaults, copy this file to
# profiles/<your-slug>/ and fill in the values.

# Institution name shown on title slides and in author info.
institution: ""

# Default language for slides, speaker notes, lab materials.
# Allowed: "English", "Russian", or any language; "English"/"Russian" have
# templates in skill/templates/{course_conventions,lab_templates}_{en,ru}.md.
default_language: ""

# LaTeX engine for slide compilation: pdflatex / xelatex / lualatex.
# Note: xelatex and lualatex support Unicode fonts natively;
# pdflatex requires T2A/inputenc for Cyrillic.
default_latex_engine: ""

# One paragraph: what students know coming in. Becomes
# CLAUDE.md → Course context → Audience.
default_audience: ""

# One paragraph: rigor vs intuition preference, formula handling. Becomes
# CLAUDE.md → Course context → Style preferences.
default_style: ""

# Lab pipeline — used by lab course-init.
# GitHub organisation hosting the starter repos.
ghc_org: ""

# Pattern for GitHub Classroom repo names.
# Variables available: {year}, {N}, {slug}.
# Example: "sp{year}-lab{N}-{slug}"
ghc_repo_naming: ""

# Default instructor name(s) for the title slide / syllabus.
default_instructor: ""
