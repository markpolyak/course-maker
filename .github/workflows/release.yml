name: release

# When you publish a Release on GitHub, build the Cowork install archive from
# the tagged skill/ tree and attach it to that release as a downloadable asset.
#
# You never edit a version anywhere: the tag you pick when drafting the release
# (e.g. v1.3.0) becomes the version, and the asset is named from it
# (course-maker-v1.3.0.zip). See docs/releasing.md for the click-by-click steps.

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
      - name: Build skill archive
        run: ./scripts/package.sh "${{ github.event.release.tag_name }}"
      - name: Attach archive to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/course-maker-*.zip --clobber
