name: e2e

# Level 3: behavioural smoke tests that drive the skill through `claude -p`.
# Costs tokens and is non-deterministic, so it does NOT run per-push and does
# NOT run on any schedule — only manually via the "Run workflow" button.
# The `schedule` trigger below is intentionally commented out: it was firing
# nightly and sending failure-notification emails even though nobody was
# running the tests. Re-enable only with explicit sign-off.
#
# Requires an ANTHROPIC_API_KEY repository secret. LaTeX is intentionally not
# installed (texlive is huge): the slides test then checks figure references but
# skips the xelatex compile. Add texlive-xetex to the steps if you want it.

on:
  # schedule:
  #   - cron: "0 3 * * *"   # 03:00 UTC nightly — disabled, manual-only per policy
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Install test dependencies
        run: python -m pip install --upgrade pip -r tests/requirements.txt
      - name: Run Level 3 smoke tests
        env:
          COURSE_MAKER_E2E: "1"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m pytest tests/e2e -v
