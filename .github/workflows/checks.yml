name: checks

# Levels 0-1: static skill checks + unit tests. Deterministic, fast, no tokens.
# Runs on every push and PR.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  static-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest PyYAML
      - name: Run Level 0 + 1
        run: python -m pytest tests/static tests/unit
